  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <button onclick=\"{{ toggleChipsExpanded }}\" style=\"padding:0;border:none;background:none;font-size:12px;font-weight:600;color:#2563eb;cursor:pointer;margin-bottom:20px;\">{{ chipsToggleLabel }}<\u002Fbutton>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ hasSelected }}\">\n          <div style=\"border-top:1px solid rgba(0,0,0,0.06);padding-top:18px;\">\n            <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px;\">\n              <div style=\"font-size:24px;font-weight:700;\">Strike {{ selected.strikeLabel }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9a9a9f;\">Implied Vol {{ selected.volSettleLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"{{ selectedGridStyle }}\">\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#86868b;margin-bottom:6px;\">\n                  <span>Call<\u002Fspan><span style=\"font-weight:700;color:#1c8a52;\">{{ selected.callLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:10px;background:#eef6f1;border-radius:6px;overflow:hidden;\">\n                  <div style=\"height:100%;background:#1c8a52;border-radius:6px;width:{{ selected.callBarWidth }};\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#86868b;margin-bottom:6px;\">\n                  <span>Put<\u002Fspan><span style=\"font-weight:700;color:#c0392b;\">{{ selected.putLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:10px;background:#fbeeec;border-radius:6px;overflow:hidden;\">\n                  <div style=\"height:100%;background:#c0392b;border-radius:6px;width:{{ selected.putBarWidth }};\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ dayLoading } 6px;\">\n                <sc-for list=\"{{ rankToggle }}\" as=\"rb\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ rb.onClick }}\" style=\"{{ rb.style }}\">{{ rb.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"{{ rankHeaderGrid }}\">\n            <div>#<\u002Fdiv><div>Strike<\u002Fdiv><div>Call<\u002Fdiv><div>Put<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ ranked }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div style=\"{{ row.rowStyle }}\" onclick=\"{{ row.onClick }}\">\n              <div style=\"font-size:12.5px;font-weight:700;color:#9a9a9f;\">{{ row.rank }}<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:700;\">{{ row.strikeLabel }}<\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;\"><span style=\"font-weight:600;color:#1c8a52;\">{{ row.callLabel }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px;background:#eef6f1;border-radius:4px;overflow:hidden;\"><div style=\"height:100%;background:#1c8a52;width:{{ row.callBarWidth }};\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;\"><span style=\"font-weight:600;color:#c0392b;\">{{ row.putLabel }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px;background:#fbeeec;border-radius:4px;overflow:hidden;\"><div style=\"height:100%;background:#c0392b;width:{{ row.putBarWidth }};\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;font-size:12px;color:#b0b0b5;text-align:center;\">\n      แหล่งข้อมูล: github.com/pageth/Vol2VolData · รีเฟรชอัตโนมัติทุก 5 นาที · อัปเดตล่าสุด {{ lastUpdatedLabel }}\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1000},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563eb&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2563eb&quot;,&quot;#0d9488&quot;,&quot;#7c3aed&quot;,&quot;#c0392b&quot;]},&quot;defaultView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;intraday&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;intraday&quot;,&quot;oi&quot;]}}\">\n\nconst RAW_BASE = 'https://raw.githubusercontent.com/pageth/Vol2VolData/main/';\nconst GITHUB_API = 'https://api.github.com/repos/pageth/Vol2VolData';\nconst HISTORY_PATH = 'IntradayData.txt';\n// commit ข้อมูลล่าสุดที่ทราบ — ใช้เดิน history เก่าเมื่อ main ถูก reset/force-push จนไม่มี commit ของไฟล์ข้อมูลเหลือ\nconst KNOWN_DATA_SHA = 'f5f94ca0279f66109f8f7078099ce1611784668e';\nfunction rawUrlAt(ref, name) {\n  return 'https://raw.githubusercontent.com/pageth/Vol2VolData/' + ref + '/' + name;\n}\n\nconst ASSETS = [\n  { key: 'gold', label: 'Gold', code: 'GC', intradayFile: 'IntradayData.txt', oiFile: 'OIData.txt' },\n  { key: 'oil', label: 'Oil', code: 'CL', intradayFile: 'Oil-IntradayData.txt', oiFile: 'Oil-OIData.txt' },\n  { key: 'es', label: 'ES', code: 'ES', intradayFile: 'ES-IntradayData.txt', oiFile: 'ES-OIData.txt' },\n];\n\nconst NEWS = [\n  { id: 1, time: '08:30', tag: 'Fed', title: 'ตลาดจับตาถ้อยแถลงประธาน Fed ก่อนการประชุมนโยบายการเงินรอบถัดไป', assets: ['gold', 'es'] },\n  { id: 2, time: '09:10', tag: 'OPEC+', title: 'OPEC+ ส่งสัญญาณคงระดับการผลิตน้ำมันในเดือนหน้า', assets: ['oil'] },\n  { id: 3, time: '10:45', tag: 'Data', title: 'ตัวเลขเงินเฟ้อสหรัฐฯ (CPI) จะประกาศสัปดาห์นี้ กระทบทิศทางดอลลาร์และทองคำ', assets: ['gold', 'oil', 'es'] },\n  { id: 4, time: '11:20', tag: 'Geopolitics', title: 'ความตึงเครียดในตะวันออกกลางหนุนราคาน้ำมันและทองคำในฐานะสินทรัพย์ปลอดภัย', assets: ['gold', 'oil'] },\n  { id: 5, time: '13:05', tag: 'Earnings', title: 'ผลประกอบการกลุ่มเทคโนโลยีรายใหญ่หนุนความเชื่อมั่นดัชนี S&P 500', assets: ['es'] },\n  { id: 6, time: '14:40', tag: 'Inventory', title: 'สต็อกน้ำมันดิบสหรัฐฯ ลดลงมากกว่าคาดการณ์ของนักวิเคราะห์', assets: ['oil'] },\n];\n\nconst SNAPSHOT = {\n  gold: {\n    intraday: { name: 'Gold', code: 'OG|GC', contract: 'G1RN6', dte: '0.00', price: 4131.1, priceChg: 48.7, title: 'Intraday Volume', put: 3854, call: 3498, vol: 33.69, volChg: -11.10, futureChg: 48.7,\n      rows: [ {strike:4120,call:132,put:122,volSettle:0.44893172902902734}, {strike:4125,call:100,put:99,volSettle:0.44832035577155693}, {strike:4130,call:175,put:55,volSettle:0.4478469442351525}, {strike:4135,call:136,put:101,volSettle:0.44751236542379047}, {strike:4140,call:83,put:109,volSettle:0.4473173202823091} ] },\n    oi: { name: 'Gold', code: 'OG|GC', contract: 'G1RN6', dte: '0.00', price: 4131.3, priceChg: 48.9, title: 'Open Interest', put: 4555, call: 4064, vol: 33.69, volChg: -11.10, futureChg: 48.9,\n      rows: [ {strike:4120,call:65,put:25,volSettle:0.44893172902902734}, {strike:4125,call:124,put:13,volSettle:0.44832035577155693}, {strike:4130,call:18,put:1,volSettle:0.4478469442351525}, {strike:4135,call:21,put:2,volSettle:0.44751236542379047}, {strike:4140,call:19,put:1,volSettle:0.4473173202823091} ] },\n  },\n  oil: {\n    intraday: { name: 'WTI Crude Oil', code: 'LO|CL', contract: 'XL1N6', dte: '0.00', price: 68.52, priceChg: -0.06, title: 'Intraday Volume', put: 1412, call: 2461, vol: 81.16, volChg: 37.45, futureChg: -0.06,\n      rows: [ {strike:68.25,call:120,put:20,volSettle:0.43799637622123555}, {strike:68.5,call:411,put:89,volSettle:0.4380907492145525}, {strike:68.75,call:31,put:13,volSettle:0.4398322253555307} ] },\n    oi: { name: 'WTI Crude Oil', code: 'LO|CL', contract: 'XL1N6', dte: '0.00', price: 68.58, priceChg: 0, title: 'Open Interest', put: 4894, call: 5852, vol: 81.16, volChg: 37.45, futureChg: 0,\n      rows: [ {strike:68.25,call:8,put:73,volSettle:0.43799637622123555}, {strike:68.5,call:53,put:105,volSettle:0.4380907492145525}, {strike:68.75,call:35,put:6,volSettle:0.4398322253555307} ] },\n  },\n  es: {\n    intraday: { name: 'S&P 500', code: 'ES|ES', contract: 'E1DN6', dte: '0.00', price: 7510.25, priceChg: -33.25, title: 'Intraday Volume', put: 191924, call: 213247, vol: 26.98, volChg: 11.51, futureChg: -33.25,\n      rows: [ {strike:7505,call:1579,put:3882,volSettle:0.16454868148139212}, {strike:7510,call:3971,put:4294,volSettle:0.1624273841152899}, {strike:7515,call:3305,put:3062,volSettle:0.16031508301966824} ] },\n    oi: { name: 'S&P 500', code: 'ES|ES', contract: 'E1DN6', dte: '0.00', price: 7509.5, priceChg: -34, title: 'Open Interest', put: 278575, call: 120578, vol: 26.98, volChg: 11.51, futureChg: -34,\n      rows: [ {strike:7505,call:161,put:268,volSettle:0.16454868148139212}, {strike:7510,call:806,put:635,volSettle:0.1624273841152899}, {strike:7515,call:432,put:238,volSettle:0.16031508301966824} ] },\n  },\n};\n\nfunction grab(label, str) {\n  const m = str.match(new RegExp(label.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&') + ':\\\\s*([-\\\\d,.]+)'));\n  return m ? parseFloat(m[1].replace(/,/g, '')) : null;\n}\n\nfunction parseDataFile(text) {\n  const lines = text.trim().split('\\n').filter(l => l.trim().length > 0);\n  const headerLine = lines[0] || '';\n  const summaryLine = lines[1] || '';\n  const rows = lines.slice(3).map(l => {\n    const parts = l.split(',');\n    return { strike: parseFloat(parts[0]), call: parseInt(parts[1], 10) || 0, put: parseInt(parts[2], 10) || 0, volSettle: parseFloat(parts[3]) || 0 };\n  }).filter(r => !isNaN(r.strike));\n\n  const m = headerLine.match(/^(.+?)\\s*\\(([^)]+)\\)\\s+(\\S+)\\s+\\(([\\d.]+)\\s*DTE\\)\\s+vs\\s+([-\\d.]+)\\s+\\(([+-][\\d.]+)\\)\\s+-\\s+(.+)$/);\n\n  return {\n    name: m ? m[1].trim() : '',\n    code: m ? m[2] : '',\n    contract: m ? m[3] : '',\n    dte: m ? m[4] : '0.00',\n    price: m ? parseFloat(m[5]) : (rows[0] ? rows[0].strike : 0),\n    priceChg: m ? parseFloat(m[6]) : 0,\n    title: m ? m[7] : '',\n    put: grab('Put', summaryLine) ?? 0,\n    call: grab('Call', summaryLine) ?? 0,\n    vol: grab('Vol', summaryLine) ?? 0,\n    volChg: grab('Vol Chg', summaryLine) ?? 0,\n    futureChg: grab('Future Chg', summaryLine) ?? 0,\n    rows,\n  };\n}\n\nfunction fmt(n) {\n  if (n == null || isNaN(n)) return '—';\n  return Math.round(n).toLocaleString();\n}\n\nfunction strikeLabel(s) {\n  return Number.isInteger(s) ? s.toLocaleString() : s.toFixed(2);\n}\n\nconst TH_TZ = 'Asia/Bangkok';\n// คีย์วันตามเขตเวลาไทย (YYYY-MM-DD)\nfunction thDayKey(d) {\n  return new Date(d).toLocaleDateString('en-CA', { timeZone: TH_TZ });\n}\n\nfunction computeXY(values, w, h, pad) {\n  const n = values.length;\n  if (n === 0) return [];\n  const max = Math.max(...values, 0.0001);\n  const min = Math.min(...values, 0);\n  const range = Math.max(max - min, 0.0001);\n  const usableW = w - pad * 2;\n  const usableH = h - pad * 2;\n  return values.map((v, i) => {\n    const x = pad + (n === 1 ? usableW / 2 : (i / (n - 1)) * usableW);\n    const y = pad + usableH - ((v - min) / range) * usableH;\n    return { x, y };\n  });\n}\n\nfunction xyToPoints(xy) {\n  return xy.map((p) => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');\n}\n\nclass Component extends DCLogic {\n  state = {\n    activeAsset: 'gold',\n    activeView: null,\n    rankBy: 'total',\n    topN: 10,\n    chipsExpanded: false,\n    selectedStrike: {},\n    data: null,\n    isLive: false,\n    lastUpdated: null,\n    refreshing: false,\n    selectedSha: 'live',\n    times: [],\n    timesLoading: true,\n    historyCache: {},\n    rangeLabel: '',\n    selectedDate: null,\n    dayFiles: {},\n    dayLoading: {},\n    hoverIdx: null,\n    deltaData: null,\n    alertSensitivity: 4,\n    soundOn: true,\n    seenAlertKeys: [],\n    selectedDayKey: null,\n    isMobile: typeof window !== 'undefined' && window.innerWidth < 860,\n  };\n\n  handleResize = () => {\n    const isMobile = window.innerWidth < 860;\n    if (isMobile !== this.state.isMobile) this.setState({ isMobile });\n  };\n\n  componentDidMount() {\n    this.loadAlertPrefs();\n    this.fetchAll();\n    this.fetchTimes();\n    this.timer = setInterval(() => {\n      if (this.state.selectedSha === 'live') this.fetchAll();\n      this.fetchTimes();\n    }, 5 * 60 * 1000);\n    window.addEventListener('resize', this.handleResize);\n  }\n\n  componentWillUnmount() {\n    if (this.timer) clearInterval(this.timer);\n    window.removeEventListener('resize', this.handleResize);\n  }\n\n  fetchFile = async (name) => {\n    const res = await fetch(RAW_BASE + name + '?t=' + Date.now(), { cache: 'no-store' });\n    if (!res.ok) throw new Error('fetch failed: ' + name);\n    const text = await res.text();\n    return parseDataFile(text);\n  };\n\n  fetchFileAt = async (sha, name) => {\n    const res = await fetch(rawUrlAt(sha, name));\n    if (!res.ok) throw new Error('fetch failed: ' + name + '@' + sha);\n    const text = await res.text();\n    return parseDataFile(text);\n  };\n\n  fetchTimes = async () => {\n    try {\n      // ดึง commit ล่าสุดของไฟล์ข้อมูล (ใหม่ -> เก่า) แล้วเอา \"2 วันล่าสุดที่มีอยู่จริงใน commit\"\n      // ไม่อิงเวลาปัจจุบันของเครื่องเลย — วันที่ทั้งหมดมาจาก commit history โดยตรง\n      let commits = [];\n      let page = 1;\n      let distinctDays = new Set();\n      // ลองจาก main ก่อน — ถ้า history ถูก reset จนว่าง ให้เดินจาก commit ข้อมูลที่ทราบ sha แทน\n      const startPoints = ['', '&sha=' + KNOWN_DATA_SHA];\n      for (const shaQS of startPoints) {\n        page = 1;\n        while (page <= 8) {\n          const url = GITHUB_API + '/commits?path=' + encodeURIComponent(HISTORY_PATH) + shaQS + '&per_page=100&page=' + page;\n          const res = await fetch(url, { headers: { Accept: 'application/vnd.github+json' } });\n          if (!res.ok) break;\n          const batch = await res.json();\n          if (!Array.isArray(batch) || batch.length === 0) break;\n          commits = commits.concat(batch);\n          batch.forEach((c) => distinctDays.add(thDayKey(c.commit.author.date)));\n          if (distinctDays.size > 2 || batch.length < 100) break;\n          page++;\n        }\n        if (commits.length > 0) break;\n      }\n\n      // commit บนสุดอาจเป็น commit ที่ \"ลบไฟล์\" — probe ว่าไฟล์มีจริง ถ้าไม่มีก็ข้าม\n      let startIdx = 0;\n      for (let i = 0; i < Math.min(3, commits.length); i++) {\n        try {\n          const probe = await fetch(rawUrlAt(commits[i].sha, HISTORY_PATH));\n          if (probe.ok) { startIdx = i; break; }\n        } catch (e) {}\n        startIdx = i + 1;\n      }\n      commits = commits.slice(startIdx);\n\n      // เก็บเฉพาะ 2 วันล่าสุดที่ปรากฏใน commit จริง\n      const dayOrder = [];\n      const daySeen = new Set();\n      commits.forEach((c) => {\n        const k = thDayKey(c.commit.author.date);\n        if (!daySeen.has(k)) { daySeen.add(k); dayOrder.push(k); }\n      });\n      const keepDays = new Set(dayOrder.slice(0, 2));\n      commits = commits.filter((c) => keepDays.has(thDayKey(c.commit.author.date)));\n\n      commits.reverse();\n      const times = commits.map((c) => ({ sha: c.sha, date: c.commit.author.date }));\n\n      let rangeLabel = '—';\n      if (times.length > 0) {\n        const first = new Date(times[0].date);\n        const last = new Date(times[times.length - 1].date);\n        const optsD = { day: 'numeric', month: 'short', year: 'numeric', timeZone: TH_TZ };\n        const optsT = { hour: '2-digit', minute: '2-digit', timeZone: TH_TZ };\n        rangeLabel = first.toLocaleDateString('th-TH', optsD) + ' ' + first.toLocaleTimeString('th-TH', optsT) + ' – ' + last.toLocaleDateString('th-TH', optsD) + ' ' + last.toLocaleTimeString('th-TH', optsT);\n      }\n      const dayKeys = [];\n      const seen = new Set();\n      times.forEach((t) => {\n        const key = thDayKey(t.date);\n        if (!seen.has(key)) { seen.add(key); dayKeys.push(key); }\n      });\n      // อย่ารีเซ็ตวันที่ผู้ใช้เลือกไว้เมื่อ fetchTimes รันซ้ำตามรอบเวลา\n      const keepDay = this.state.selectedDayKey && dayKeys.includes(this.state.selectedDayKey) ? this.state.selectedDayKey : (dayKeys.length > 0 ? dayKeys[dayKeys.length - 1] : null);\n      this.setState({ times, timesLoading: false, rangeLabel, selectedDayKey: keepDay }, () => {\n        if (keepDay) this.ensureDaySeries(this.state.activeAsset, this.state.activeView ?? (this.props.defaultView ?? 'intraday'), keepDay);\n        this.checkAlerts();\n        // fetchAll รอบแรกอาจรันก่อน times มา ทำให้ fallback ไป mock — รันซ้ำเมื่อรู้ sha ข้อมูลจริงแล้ว\n        if (this.state.selectedSha === 'live' && times.length > 0) this.fetchAll();\n      });\n      // เลือกช่วงวันเวลาล่าสุดที่มีอยู่จริงในฐานข้อมูล (commit ล่าสุด) แทนการอิงวันเวลาปัจจุบันของเครื่อง\n      if (times.length > 0) {\n        const latest = times[times.length - 1];\n        this.selectTime(latest.sha, latest.date);\n      }\n    } catch (e) {\n      this.setState({ times: [], timesLoading: false });\n    }\n  };\n\n  selectTime = (sha, date) => {\n    if (sha === 'live') {\n      this.setState({ selectedSha: 'live', selectedDate: null });\n      this.fetchAll();\n      return;\n    }\n    this.setState({ selectedSha: sha, selectedDate: date });\n    if (this.state.historyCache[sha]) {\n      this.setState({ data: this.state.historyCache[sha] });\n    } else {\n      this.fetchHistorical(sha);\n    }\n  };\n\n  fetchHistorical = async (sha) => {\n    this.setState({ refreshing: true });\n    const results = {};\n    for (const cfg of ASSETS) {\n      try {\n        const [intraday, oi] = await Promise.all([this.fetchFileAt(sha, cfg.intradayFile), this.fetchFileAt(sha, cfg.oiFile)]);\n        results[cfg.key] = { intraday, oi, fallback: false };\n      } catch (e) {\n        results[cfg.key] = { intraday: SNAPSHOT[cfg.key].intraday, oi: SNAPSHOT[cfg.key].oi, fallback: true };\n      }\n    }\n    this.setState((s) => ({ data: results, refreshing: false, historyCache: { ...s.historyCache, [sha]: results } }));\n  };\n\n  fetchAll = async () => {\n    this.setState({ refreshing: true });\n    const results = {};\n    let anyLive = false;\n    const latestSha = this.state.times.length > 0 ? this.state.times[this.state.times.length - 1].sha : null;\n    for (const cfg of ASSETS) {\n      try {\n        const [intraday, oi] = await Promise.all([this.fetchFile(cfg.intradayFile), this.fetchFile(cfg.oiFile)]);\n        results[cfg.key] = { intraday, oi, fallback: false };\n        anyLive = true;\n      } catch (e) {\n        // ไฟล์อาจถูกลบออกจาก HEAD แล้ว — ใช้ commit ล่าสุดที่มีข้อมูลจริงแทน\n        try {\n          if (!latestSha) throw e;\n          const [intraday, oi] = await Promise.all([this.fetchFileAt(latestSha, cfg.intradayFile), this.fetchFileAt(latestSha, cfg.oiFile)]);\n          results[cfg.key] = { intraday, oi, fallback: false };\n          anyLive = true;\n        } catch (e2) {\n          results[cfg.key] = { intraday: SNAPSHOT[cfg.key].intraday, oi: SNAPSHOT[cfg.key].oi, fallback: true };\n        }\n      }\n    }\n    this.setState({ data: results, isLive: anyLive, lastUpdated: new Date(), refreshing: false });\n  };\n\n  setAsset = (key) => {\n    this.setState({ activeAsset: key });\n    this.ensureDaySeries(key, this.state.activeView ?? (this.props.defaultView ?? 'intraday'), this.state.selectedDayKey);\n  };\n  setView = (v) => {\n    this.setState({ activeView: v });\n    this.ensureDaySeries(this.state.activeAsset, v, this.state.selectedDayKey);\n  };\n\n  setSelectedDayAndFetch = (dayKey) => {\n    this.setState({ selectedDayKey: dayKey });\n    this.ensureDaySeries(this.state.activeAsset, this.state.activeView ?? (this.props.defaultView ?? 'intraday'), dayKey);\n  };\n\n  ensureDaySeries = (assetKey, viewKey, dayKey) => { l' ? 'ทั้งหมด' : 'Top ' + n,\n      onClick: () => this.setTopN(n),\n      style: 'padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid ' + (topN === n ? accent : 'rgba(0,0,0,0.08)') + ';background:' + (topN === n ? accent : '#fff') + ';color:' + (topN === n ? '#fff' : '#54545a') + ';',\n    }));\n\n    const viewToggle = [\n      { key: 'intraday', label: 'Intraday Volume' },\n      { key: 'oi', label: 'Open Interest' },\n    ].map((o) => ({\n      label: o.label,\n      onClick: () => this.setView(o.key),\n      style: 'padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid ' + (activeView === o.key ? accent : 'rgba(0,0,0,0.08)') + ';background:' + (activeView === o.key ? accent : '#fff') + ';color:' + (activeView === o.key ? '#fff' : '#54545a') + ';',\n    }));\n\n    const pcRatio = assetData.call ? (assetData.put / assetData.call).toFixed(2) : '—';\n\n    const summary = {\n      priceLabel: strikeLabel(assetData.price),\n      chgLabel: (assetData.priceChg >= 0 ? '+' : '') + assetData.priceChg,\n      chgColor: assetData.priceChg >= 0 ? '#1c8a52' : '#c0392b',\n      contract: assetData.contract,\n      dteLabel: assetData.dte + ' DTE',\n      putLabel: fmt(assetData.put),\n      callLabel: fmt(assetData.call),\n      pcRatio,\n      volLabel: assetData.vol.toFixed(2) + '%',\n      volChgLabel: (assetData.volChg >= 0 ? '+' : '') + assetData.volChg.toFixed(2),\n      volChgColor: assetData.volChg >= 0 ? '#1c8a52' : '#c0392b',\n    };\n\n    const news = NEWS.filter((n) => n.assets.includes(activeAsset)).map((n) => ({\n      time: n.time,\n      tag: n.tag,\n      title: n.title,\n      assetsLabel: n.assets.map((k) => ASSETS.find((a) => a.key === k).label).join(', '),\n    }));\n\n    const fallbackAny = ASSETS.some((a) => dataBundle[a.key].fallback);\n    const isHistory = this.state.selectedSha !== 'live';\n    const statusColor = isHistory ? '#2563eb' : (this.state.isLive && !fallbackAny ? '#1c8a52' : '#e0a53a');\n    const statusLabel = isHistory\n      ? 'ย้อนหลัง'\n      : (this.state.isLive && !fallbackAny ? 'Live · GitHub' : 'ข้อมูลตัวอย่าง (ดึงจาก GitHub ไม่สำเร็จ)');\n\n    const lastUpdatedLabel = this.state.lastUpdated ? this.state.lastUpdated.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: TH_TZ }) : '—';\n\n    const dateOpts = { day: 'numeric', month: 'short', timeZone: TH_TZ };\n    const timeOpts = { hour: '2-digit', minute: '2-digit', timeZone: TH_TZ };\n    let lastDateKey = null;\n    const uniqueDayKeys = [];\n    const seenDays = new Set();\n    this.state.times.forEach((t) => {\n      const k = thDayKey(t.date);\n      if (!seenDays.has(k)) { seenDays.add(k); uniqueDayKeys.push(k); }\n    });\n    const dayChips = uniqueDayKeys.map((k) => {\n      const isSel = this.state.selectedDayKey === k;\n      const d = new Date(k);\n      return {\n        key: k,\n        label: d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', timeZone: TH_TZ }),\n        onClick: () => this.setSelectedDayAndFetch(k),\n        style: 'padding:8px 16px;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;flex:none;border:1.5px solid ' + (isSel ? accent : 'rgba(0,0,0,0.08)') + ';background:' + (isSel ? accent : '#fff') + ';color:' + (isSel ? '#fff' : '#3a3a3d') + ';',\n      };\n    });\n\n    const timesForDay = this.state.times.filter((t) => thDayKey(t.date) === this.state.selectedDayKey);\n\n    const timeChips = [\n      {\n        sha: 'live',\n        label: 'Live',\n        onClick: () => this.selectTime('live', null),\n        style: 'padding:8px 16px;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;flex:none;border:1.5px solid ' + (!isHistory ? accent : 'rgba(0,0,0,0.08)') + ';background:' + (!isHistory ? accent : '#fafafa') + ';color:' + (!isHistory ? '#fff' : '#3a3a3d') + ';',\n      },\n    ].concat(\n      timesForDay.map((t) => {\n        const isSel = isHistory && this.state.selectedSha === t.sha;\n        const d = new Date(t.date);\n        const label = d.toLocaleTimeString('th-TH', timeOpts);\n        return {\n          sha: t.sha,\n          label,\n          onClick: () => this.selectTime(t.sha, t.date),\n          style: 'padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;flex:none;border:1.5px solid ' + (isSel ? accent : 'rgba(0,0,0,0.08)') + ';background:' + (isSel ? accent : '#fafafa') + ';color:' + (isSel ? '#fff' : '#3a3a3d') + ';',\n        };\n      })\n    );\n\n    const timesEmpty = !this.state.timesLoading && timesForDay.length === 0;\n\n    // ---------- Alerts ----------\n    const sensitivity = this.state.alertSensitivity;\n    const alertsRaw = this.computeAlerts(sensitivity);\n    const alertedStrikeSet = new Set(alertsRaw.filter((a) => a.assetKey === activeAsset).map((a) => a.strike));\n    const dd = this.state.deltaData;\n    const alertWindowLabel = dd\n      ? new Date(dd.prevTime).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: TH_TZ }) + ' → ' + new Date(dd.currTime).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: TH_TZ })\n      : '—';\n    const alerts = alertsRaw.slice(0, 12).map((a) => ({\n      assetLabel: a.assetLabel,\n      strikeLabel: strikeLabel(a.strike),\n      deltaLabel: '+' + fmt(a.totalDelta),\n      detailLabel: 'Call +' + fmt(a.callDelta) + ' · Put +' + fmt(a.putDelta),\n      scoreLabel: a.score.toFixed(1) + '×',\n      isActiveAsset: a.assetKey === activeAsset,\n      onClick: () => {\n        this.setAsset(a.assetKey);\n        this.selectStrike(a.assetKey, a.strike);\n      },\n    }));\n    const hasAlerts = alerts.length > 0;\n    const noAlerts = !hasAlerts && !!dd;\n    const alertsPending = !dd;\n    const sensitivityLabel = sensitivity.toFixed(1) + '× ของค่ากลาง';\n    const onSensitivityChange = (e) => this.setSensitivity(parseFloat(e.target.value));\n    const soundOn = this.state.soundOn;\n    const soundLabel = soundOn ? '🔔 เสียงเปิด' : '🔕 เสียงปิด';\n    const soundStyle = 'padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid ' + (soundOn ? accent : 'rgba(0,0,0,0.08)') + ';background:' + (soundOn ? accent : '#fff') + ';color:' + (soundOn ? '#fff' : '#54545a') + ';';\n    const toggleSound = () => this.toggleSound();\n\n    // ทำเครื่องหมาย strike ที่มี alert ในตารางอันดับ\n    ranked.forEach((row) => {\n      if (alertedStrikeSet.has(row.strike)) row.strikeLabel = '⚠ ' + row.strikeLabel;\n    });\n\n    const latestDbTime = this.state.times.length > 0 ? this.state.times[this.state.times.length - 1].date : null;\n    const selectedTimeLabel = isHistory && this.state.selectedDate\n      ? new Date(this.state.selectedDate).toLocaleString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: TH_TZ })\n      : (latestDbTime\n        ? new Date(latestDbTime).toLocaleString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: TH_TZ })\n        : 'กำลังโหลด…');\n\n    return {\n      loading: false,\n      notLoading: true,\n      tabs,\n      viewToggle,\n      chips,\n      hasSelected: !!selected,\n      selected,\n      strikeSeries,\n      hasStrikeSeries: !!strikeSeries,\n      dayLoading,\n      ranked,\n      rankToggle,\n      topNToggle,\n      needsCollapse,\n      chipsExpanded,\n      chipsToggleLabel,\n      toggleChipsExpanded: () => this.toggleChipsExpanded(),\n      summary,\n      news,\n      showNews,\n      statusColor,\n      statusLabel,\n      refreshLabel: this.state.refreshing ? 'กำลังรีเฟรช…' : 'รีเฟรช',\n      refresh: () => this.fetchAll(),\n      lastUpdatedLabel,\n      timeChips,\n      dayChips,\n      alerts,\n      hasAlerts,\n      noAlerts,\n      alertsPending,\n      alertWindowLabel,\n      sensitivity,\n      sensitivityLabel,\n      onSensitivityChange,\n      soundLabel,\n      soundStyle,\n      toggleSound,\n      isMobile,\n      pagePadding,\n      cardPadding,\n      mainGridStyle,\n      selectedGridStyle,\n      rankHeaderGrid,\n      rankRowGrid,\n      headlineFontSize,\n      summaryGridStyle,\n      newsPosition,\n      timesLoading: this.state.timesLoading,\n      timesEmpty,\n      isHistory,\n      selectedTimeLabel,\n      rangeLabel: this.state.rangeLabel,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
