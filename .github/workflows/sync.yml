name: Mirror Vol2Vol Data

on:
  schedule:
    # รันทุก 5 นาที (GitHub อาจดีเลย์เป็น 10-15 นาทีช่วงโหลดสูง)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # กดรันเองได้จากหน้า Actions

permissions:
  contents: write

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4

      - name: Fetch data files from source repo
        id: fetch
        run: |
          SRC="https://raw.githubusercontent.com/pageth/Vol2VolData/main"
          FILES="IntradayData.txt OIData.txt Oil-IntradayData.txt Oil-OIData.txt ES-IntradayData.txt ES-OIData.txt"
          mkdir -p _incoming
          ok=0
          for f in $FILES; do
            code=$(curl -s -o "_incoming/$f" -w "%{http_code}" "$SRC/$f?t=$(date +%s)")
            if [ "$code" = "200" ] && [ -s "_incoming/$f" ]; then
              ok=$((ok+1))
            else
              rm -f "_incoming/$f"
              echo "WARN: $f not available (HTTP $code)"
            fi
          done
          echo "fetched=$ok" >> "$GITHUB_OUTPUT"

      - name: Commit if data changed
        if: steps.fetch.outputs.fetched != '0'
        run: |
          changed=0
          for f in _incoming/*.txt; do
            name=$(basename "$f")
            if ! cmp -s "$f" "$name" 2>/dev/null; then
              cp "$f" "$name"
              changed=1
            fi
          done
          rm -rf _incoming
          if [ "$changed" = "1" ]; then
            git config user.name "vol2vol-mirror-bot"
            git config user.email "actions@github.com"
            git add ./*.txt
            git commit -m "Data Sync: $(TZ=Asia/Bangkok date '+%-m/%-d/%Y, %H:%M:%S')"
            git push
          else
            echo "No changes — skip commit"
          fi
