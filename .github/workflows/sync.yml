name: Mirror Vol2Vol Data + Telegram Alert

on:
  schedule:
    # รันทุก 5 นาที (GitHub อาจดีเลย์เป็น 10-15 นาทีช่วงโหลดสูง)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # กดรันเองได้จากหน้า Actions

permissions:
  contents: write

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4

      - name: Keep copy of current data (for alert diff)
        run: |
          mkdir -p _old
          cp *.txt _old/ 2>/dev/null || true

      - name: Fetch data files from source repo
        id: fetch
        run: |
          SRC="https://raw.githubusercontent.com/pageth/Vol2VolData/main"
          FILES="IntradayData.txt OIData.txt Oil-IntradayData.txt Oil-OIData.txt ES-IntradayData.txt ES-OIData.txt"
          mkdir -p _incoming
          ok=0
          for f in $FILES; do
            code=$(curl -s -o "_incoming/$f" -w "%{http_code}" "$SRC/$f?t=$(date +%s)")
            if [ "$code" = "200" ] && [ -s "_incoming/$f" ]; then
              ok=$((ok+1))
            else
              rm -f "_incoming/$f"
              echo "WARN: $f not available (HTTP $code)"
            fi
          done
          echo "fetched=$ok" >> "$GITHUB_OUTPUT"

      - name: Apply changes
        id: apply
        if: steps.fetch.outputs.fetched != '0'
        run: |
          changed=0
          for f in _incoming/*.txt; do
            name=$(basename "$f")
            if ! cmp -s "$f" "$name" 2>/dev/null; then
              cp "$f" "$name"
              changed=1
            fi
          done
          rm -rf _incoming
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Check abnormal volume & send Telegram alert
        if: steps.apply.outputs.changed == '1'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_SENSITIVITY: "4"    # ความไว: ต่ำ = เตือนบ่อย, สูง = เตือนเฉพาะผิดปกติมาก
          ALERT_MIN_DELTA: "20"     # ขั้นต่ำสัญญาที่เพิ่มต่อ 5 นาที
        run: node alert-check.js _old .

      - name: Get source commit time (so mirror timestamps match the data source)
        id: srctime
        if: steps.apply.outputs.changed == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SRC_DATE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/pageth/Vol2VolData/commits?path=IntradayData.txt&per_page=1" \
            | grep -m1 '"date"' | sed 's/.*"date": *"\([^"]*\)".*/\1/')
          echo "date=$SRC_DATE" >> "$GITHUB_OUTPUT"
          echo "Source commit time: $SRC_DATE"

      - name: Commit new data
        if: steps.apply.outputs.changed == '1'
        env:
          SRC_DATE: ${{ steps.srctime.outputs.date }}
        run: |
          rm -rf _old
          git config user.name "vol2vol-mirror-bot"
          git config user.email "actions@github.com"
          git add ./*.txt
          # ใช้เวลา commit ของต้นทางเป็นเวลา commit ของ mirror — ป้ายเวลาบน dashboard จะตรงกับ data source
          if [ -n "$SRC_DATE" ]; then
            export GIT_AUTHOR_DATE="$SRC_DATE"
            export GIT_COMMITTER_DATE="$SRC_DATE"
            MSG_TIME=$(TZ=Asia/Bangkok date -d "$SRC_DATE" '+%-m/%-d/%Y, %H:%M:%S' 2>/dev/null || TZ=Asia/Bangkok date '+%-m/%-d/%Y, %H:%M:%S')
          else
            MSG_TIME=$(TZ=Asia/Bangkok date '+%-m/%-d/%Y, %H:%M:%S')
          fi
          git commit -m "Data Sync: $MSG_TIME"
          git push

